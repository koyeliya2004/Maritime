name: Sync HuggingFace Backend

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone Hugging Face Space
        run: git clone https://huggingface.co/spaces/Arko007/maritime hf-backend

      - name: Replace backend folder
        run: |
          rm -rf backend
          mkdir backend
          cp -r hf-backend/* backend/

      - name: Remove unnecessary files
        run: |
          rm -rf backend/.git
          rm -rf backend/.gitattributes

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add backend
          git commit -m "Auto sync backend from Hugging Face" || echo "No changes"
          git push
